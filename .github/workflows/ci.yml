name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

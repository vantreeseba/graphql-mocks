name: Release

on:
  workflow_run:
    workflows: ["Test"]
    branches:
      - main
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # One repo-wide version: semantic-release runs at the root, derives the
      # version from `v*` tags, and (via @semantic-release/exec) bumps and
      # publishes every workspace together.
      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC trusted publishing (id-token: write) is preferred; NODE_AUTH_TOKEN
          # is a fallback so `npm publish --workspaces` can authenticate — notably
          # for the first publish of @vantreeseba/graphql-mocks-codegen, which has
          # no trusted-publisher entry yet.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}

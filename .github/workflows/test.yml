name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run coverage

      - name: Build
        run: npm run build
